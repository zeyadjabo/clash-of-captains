name: Update FPL Dashboard

on:
  schedule:
    - cron: '0 13 * * *'    # (9 AM Eastern)
    - cron: '0 1 * * *'     # (9 PM Eastern)
  workflow_dispatch:        # Allows you to run manually

concurrency:
  group: update-dashboard-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Dashboard Script
        run: python dashboard_engine.py

      - name: Commit & Push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Dashboard auto-updated"
            git pull --rebase origin main
            git push
          fi
